[PHP]
extension_dir = "ext"
date.timezone = "Asia/Ho_Chi_Minh"
memory_limit = 256M
max_execution_time = 120
upload_max_filesize = 10M
post_max_size = 12M
display_errors = Off
log_errors = On
error_log = "C:\KhachMoiVMS\logs\php-error.log"
cgi.force_redirect = 0
cgi.fix_pathinfo = 1
fastcgi.impersonate = 1

extension=curl
extension=fileinfo
extension=gd
extension=mbstring
extension=openssl
extension=pdo_mysql
extension=mysqli
extension=zip

[Session]
session.use_strict_mode = 1

[opcache]
zend_extension=opcache
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=128
opcache.max_accelerated_files=10000
opcache.validate_timestamps=0
